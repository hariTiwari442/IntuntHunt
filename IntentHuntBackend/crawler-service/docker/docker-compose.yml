version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: intenthunt_postgres
    environment:
      POSTGRES_USER: intenthunt
      POSTGRES_PASSWORD: intenthunt
      POSTGRES_DB: intenthunt_crawler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intenthunt -d intenthunt_crawler"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: intenthunt_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: intenthunt_api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://intenthunt:intenthunt@postgres:5432/intenthunt_crawler
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: intenthunt_worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://intenthunt:intenthunt@postgres:5432/intenthunt_crawler
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2   # scale workers independently

volumes:
  postgres_data:
  redis_data:
